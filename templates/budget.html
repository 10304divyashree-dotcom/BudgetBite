<!DOCTYPE html>
<html>
<head>
<title>Set Budget</title>
<style>
body{
font-family:Arial;
background:black;
text-align:center;
padding-top:100px;
color:white;
}
h2{
    color:#ffd700;
}
form{
background:#111;
padding:30px;
display:inline-block;
border-radius:10px;
}
input{
padding:10px;
margin:10px;
border:1px solid #ffd700;
background:black;
color:white;
}
input::placeholder{
    color:#ccc;
}
button{
padding:10px 20px;
background:#ffd700;
color:black;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Set Your Food Budget</h2>

<form method="post">

<input type="number" name="budget" placeholder="Enter Budget" required>

<br>

<button type="submit">Save Budget</button>

</form>

</body>
</html>
