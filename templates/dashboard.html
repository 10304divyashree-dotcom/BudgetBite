<!DOCTYPE html>
<html>
<head>

<title>Food Budget Dashboard</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#ff5200;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
font-size:20px;
}

.container{
padding:20px;
}

.food-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.food-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.food-card img{
width:100%;
height:180px;
object-fit:cover;
}

.food-info{
padding:10px;
}

button{
background:#ff5200;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

.cart-box{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<div>Welcome {{name}} 🍔</div>

<div>
<a href="/logout" style="color:white;">Logout</a>
</div>

</header>

<div class="container">

<h2>Food Menu</h2>

<div class="food-container">

{% for food in foods %}

<div class="food-card">

<img src="https://source.unsplash.com/400x300/?{{food.name}},food">

<div class="food-info">

<h3>{{food.name}}</h3>

<p>₹{{food.price}}</p>

<a href="/add_to_cart/{{food.id}}">
<button>Add to Cart</button>
</a>

</div>

</div>

{% endfor %}

</div>

<div class="cart-box">

<h3>Your Cart</h3>

{% if cart %}

<ul>

{% for item in cart %}

<li>{{item.name}} - ₹{{item.price}}</li>

{% endfor %}

</ul>

<p><b>Total: ₹{{cart_total}}</b></p>

<a href="/place_order">
<button>Place Order</button>
</a>

{% else %}

<p>Cart is empty</p>

{% endif %}

</div>

</div>

</body>
</html>
