<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background:black;
text-align:center;
padding-top:100px;
color: white;
}
h2{
    color:#ffd700
}
form{
background:#111;
padding:30px;
display:inline-block;
border-radius:10px;
}
input{
display:block;
margin:10px;
padding:10px;
width:200px;
border:1px solid #ffd700;
background:black;
color:white;
}
input::placeholder{
    color:#ccc;
}
button{
padding:10px 20px;
background:#ffd700;
color:black;
border:none;
font-weight:bold;
}
a{
color:#ffd700;       /* mustard link */
text-decoration:none;
font-weight:bold;
}

p{
color:white;
}
</style>
</head>

<body>

<h2>Food Budget Login</h2>

<form action="/login" method="post">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>New User?</p>

<a href="/register">Register</a>

</form>

</body>
</html>
