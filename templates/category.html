<!DOCTYPE html>
<html>
<head>

<title>{{category}} Foods</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.food-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:40px;
}

.food-card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
}

.food-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff5200;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}
.back-btn{
text-decoration:none;
font-size:18px;
color:#ff5200;
font-weight:bold;
margin:20px;
display:inline-block;
}

</style>

</head>

<body>

<a href="/home" class="back-btn">⬅ Back</a>
<h2 style="text-align:center;">{{category}} Foods</h2>

<div class="food-grid">

{% for food in foods %}

<div class="food-card">

<img src="{{ url_for('static', filename='images/' + food.image) }}">

<h3>{{food.name}}</h3>

<p>₹{{food.price}}</p>

<a href="/add_to_cart/{{food.id}}">
<button>Add to Cart</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
