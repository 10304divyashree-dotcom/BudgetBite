<!DOCTYPE html>
<html>
<head>

<title>Your Cart</title>

<style>

body{
font-family:Arial;
background:black;
color:white;
}

.container{
width:70%;
margin:auto;
}
h2{
  color:#ffd700;
}

.cart-item{
background:#111;
padding:15px;
margin:15px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #ffd700;
}

button{
background:#ffd700;
color:black;
border:none;
padding:8px 12px;
border-radius:5px;
font-weight:bold;
}
.remove-btn{
  background:#ff4d4d;
  color:white;
}

.total{
background:#111;
padding:20px;
margin:20px;
border-radius:10px;
font-size:20px;
border:1px solid #ffd700;
}

.alert{
background:#ff4d4d;
color:white;
padding:12px;
border-radius:8px;
margin:15px 0;
}
.place-order{
background:#ffd700;
color:black;
}

.back-home{
background:black;
color:#ffd700;
border:1px solid #ffd700;
}

</style>

</head>

<body>

<div class="container">

<h2>Your Cart 🛒</h2>

<!-- ⭐ FLASH MESSAGE ADDED HERE -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert">
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}

{% for item in cart_items %}

<div class="cart-item">

<div>
<h3>{{item.name}}</h3>
<p>{{item.hotel}}</p>
</div>

<div>
₹{{item.price}}
</div>

<div>
<a href="/remove/{{item.id}}">
<button>Remove</button>
</a>
</div>

</div>

{% endfor %}

<div class="total">

<b>Total: ₹{{total}}</b>

</div>

<br>

<a href="/place_order">
<button style="background:green;">Place Order</button>
</a>

<a href="{{url_for('home')}}">
<button>Back to Home</button>
</a>

</div>

</body>
</html>
