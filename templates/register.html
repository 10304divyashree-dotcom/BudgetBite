<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
font-family:Arial;
background:black;
text-align:center;
padding-top:100px;
color:white;
}
h2{
    color:#ffd700;
}
form{
background:#111;
padding:30px;
display:inline-block;
border-radius:10px;
}
input{
display:block;
margin:10px;
padding:10px;
width:200px;
background:black;
color:white;
border:1px solid #ffd700;
}
input::placeholder{
    color:#ccc;
}
button{
padding:10px 20px;
background:#ffd700;
color:black;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Create Account</h2>

<form method="post">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

</body>
</html>
